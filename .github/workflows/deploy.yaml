name: Deploy Sampah Masyarakat ke AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sampah-masyarakat:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Login ke docker di EC2
          echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Pull image yang benar: sampah-masyarakat
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sampah-masyarakat:latest
          
          # Hentikan container lama (pakai nama yang konsisten)
          sudo docker stop app-sampah || true
          sudo docker rm app-sampah || true
          
          # Jalankan container baru
          sudo docker run -d \
            --name app-sampah \
            -p 80:80 \
            --restart unless-stopped \
            -e DB_HOST="${{ secrets.DB_HOST }}" \
            -e DB_USER="${{ secrets.DB_USER }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e DB_NAME="${{ secrets.DB_NAME }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_REGION="eu-north-1" \
            -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
            ${{ secrets.DOCKER_USERNAME }}/sampah-masyarakat:latest
          
          # Bersihkan sisa image lama agar disk EC2 tidak penuh
          sudo docker image prune -f